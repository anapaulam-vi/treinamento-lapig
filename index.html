<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Treinamento de Interpretação - LAPIG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .map-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; color: #00ff00; font-size: 30px; pointer-events: none; }
        #map { cursor: default !important; background: #000; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-white p-4 shadow-md flex justify-between items-center border-b-4 border-blue-600">
        <h1 class="font-black text-xl text-slate-700 tracking-tighter">TREINAMENTO <span class="text-blue-600">LAPIG</span></h1>
        <div id="coords-display" class="hidden font-mono bg-slate-800 text-white px-4 py-2 rounded-lg text-sm"></div>
        <div id="score" class="font-bold text-slate-600 bg-gray-200 px-4 py-2 rounded-lg">Acertos: 0 | Total: 0</div>
    </header>

    <main class="max-w-[1500px] mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6 p-6">
        <div class="lg:col-span-3 space-y-4">
            <div class="relative h-[450px] rounded-2xl overflow-hidden shadow-2xl border-4 border-white">
                <div id="map" class="h-full w-full"></div>
                <div class="map-crosshair">+</div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-200 h-[300px]">
                <canvas id="ndviChart"></canvas>
            </div>
        </div>

        <div id="quiz-panel" class="bg-white p-6 rounded-2xl shadow-xl border border-gray-200 flex flex-col gap-4">
            <h2 class="font-bold text-gray-400 uppercase text-xs tracking-widest mb-2 text-center">Formulário de Análise</h2>
            
            <div>
                <label class="text-xs font-bold text-gray-600 uppercase">Bioma</label>
                <select id="q-bioma" class="w-full mt-1 p-3 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none focus:border-blue-500">
                    <option value="">Selecione...</option>
                    <option value="Amazonia">Amazônia</option>
                    <option value="Cerrado">Cerrado</option>
                </select>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-600 uppercase">Classe</label>
                <select id="q-classe" class="w-full mt-1 p-3 bg-gray-50 border-2 border-gray-100 rounded-xl outline-none focus:border-blue-500">
                    <option value="">Selecione...</option>
                    <option value="Formação Florestal">Formação Florestal</option>
                    <option value="Pastagem">Pastagem</option>
                </select>
            </div>

            <button onclick="verificar()" id="btn-action" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black hover:bg-blue-700 transition-all">ENVIAR ANÁLISE</button>
            <button onclick="proxima()" id="btn-next" class="hidden w-full bg-emerald-500 text-white py-4 rounded-xl font-black hover:bg-emerald-600 transition-all">PRÓXIMA ÁREA ➔</button>

            <div id="feedback" class="hidden p-4 rounded-xl text-xs leading-relaxed border-2"></div>
        </div>
    </main>

    <script>
        let dadosCSV = [];
        let questaoAtual = null;
        let acertos = 0;
        let total = 0;
        let chart;

        const map = L.map('map', { dragging: false, zoomControl: false, scrollWheelZoom: false, touchZoom: false }).setView([0,0], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // Carrega o CSV usando a biblioteca PapaParse
        Papa.parse("dados.csv", {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                dadosCSV = results.data;
                proxima();
            }
        });

        function proxima() {
            questaoAtual = dadosCSV[Math.floor(Math.random() * dadosCSV.length)];
            map.setView([questaoAtual.lat, questaoAtual.lon], 14);
            
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('coords-display').classList.add('hidden');
            document.getElementById('btn-action').classList.remove('hidden');
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('q-bioma').value = "";
            document.getElementById('q-classe').value = "";
            
            // Simulação de dados para o gráfico (substitua conforme necessário)
            desenharGrafico([0.8, 0.85, 0.82, 0.75, 0.7, 0.65, 0.6, 0.65, 0.75, 0.8, 0.82, 0.85], [200, 250, 300, 150, 50, 20, 10, 20, 80, 150, 200, 250]);
        }

        function verificar() {
            const userBioma = document.getElementById('q-bioma').value;
            const userClasse = document.getElementById('q-classe').value;
            const feedback = document.getElementById('feedback');
            total++;

            document.getElementById('coords-display').innerHTML = `📍 Lat: ${questaoAtual.lat} | Lon: ${questaoAtual.lon}`;
            document.getElementById('coords-display').classList.remove('hidden');

            feedback.classList.remove('hidden');
            if(userBioma === questaoAtual.bioma_certa && userClasse === questaoAtual.classe_certa) {
                acertos++;
                feedback.className = "p-4 rounded-xl text-xs border-2 bg-green-50 border-green-200 text-green-700";
                feedback.innerHTML = `<b>✅ ACERTOU!</b><br>${questaoAtual.explicacao_bioma}<br>${questaoAtual.explicacao_classe}`;
            } else {
                feedback.className = "p-4 rounded-xl text-xs border-2 bg-red-50 border-red-200 text-red-700";
                feedback.innerHTML = `<b>❌ ERROU.</b><br>${questaoAtual.explicacao_bioma}<br>${questaoAtual.explicacao_classe}`;
            }

            document.getElementById('score').innerHTML = `Acertos: ${acertos} | Total: ${total}`;
            document.getElementById('btn-action').classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function desenharGrafico(ndvi, chuva) {
            const ctx = document.getElementById('ndviChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                data: {
                    labels: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
                    datasets: [{ label: 'NDVI', type: 'line', data: ndvi, borderColor: '#16a34a', tension: 0.3, yAxisID: 'y' },
                               { label: 'Chuva', type: 'bar', data: chuva, backgroundColor: 'rgba(59, 130, 246, 0.5)', yAxisID: 'y1' }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 1 }, y1: { position: 'right' } } }
            });
        }
    </script>
</body>
</html>
