<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Treinamento de Sensoriamento Remoto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">

    <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 space-y-4">
            <div id="map" class="h-[400px] w-full bg-black rounded-lg shadow-lg relative">
                <div class="absolute top-1/2 left-1/2 text-green-500 text-3xl font-bold z-[1000] -translate-x-1/2 -translate-y-1/2 pointer-events-none">+</div>
            </div>
            <div class="bg-white p-4 rounded-lg shadow">
                <canvas id="ndviChart" height="150"></canvas>
            </div>
        </div>

        <div id="quiz" class="bg-white p-6 rounded-lg shadow space-y-3">
            <h2 class="font-bold border-b pb-2">Questionário</h2>
            <select id="q-cor" class="w-full p-2 border rounded">
                <option value="">Cor...</option><option value="Verde">Verde</option>
            </select>
            <select id="q-bioma" class="w-full p-2 border rounded">
                <option value="">Bioma...</option><option value="Amazonia">Amazônia</option><option value="Cerrado">Cerrado</option>
            </select>
            <button onclick="verificar()" class="w-full bg-blue-600 text-white py-2 rounded">Enviar</button>
            <div id="feedback" class="hidden p-3 text-sm rounded border"></div>
        </div>
    </div>

    <script>
        // Configuração do Mapa
        const map = L.map('map', { dragging: false, zoomControl: false }).setView([-4.649, -66.227], 13);
        // Use a camada do LAPIG ou ArcGIS World Imagery
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // Carregar CSV
        Papa.parse("dados.csv", {
            download: true, header: true,
            complete: (results) => { 
                window.dados = results.data; 
                carregarQuestao(0); 
            },
            error: () => alert("Erro ao carregar o arquivo CSV. Verifique o caminho!")
        });

        function carregarQuestao(index) {
            const q = window.dados[index];
            map.setView([q.lat, q.lon], 13);
            // Aqui você chamaria o endpoint de séries temporais do LAPIG
        }

        function verificar() {
            // Lógica de validação com feedback visual
            const select = document.getElementById('q-bioma');
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');
            
            if(select.value === "Amazonia") {
                select.classList.add('bg-green-100');
                feedback.innerHTML = "✅ Correto!";
                feedback.className = "p-3 text-sm rounded border bg-green-50 text-green-700";
            } else {
                select.classList.add('bg-red-100');
                feedback.innerHTML = "❌ Incorreto.";
                feedback.className = "p-3 text-sm rounded border bg-red-50 text-red-700";
            }
        }
    </script>
</body>
</html>
